<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0e0e10" />
<title>Polarity</title>
<style>
  :root {
    --bg: #0e0e10;
    --panel: #18181b;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.18);
    --text: #f4f4f5;
    --text-muted: #a1a1aa;
    --text-dim: #71717a;
    --accent: #1d9e75;
    --accent-dark: #04342c;
    --danger: #e24b4a;
    --warn: #ef9f27;
    --warn-text: #ba7517;
    --obstacle: #d4537e;
    --obstacle-cap: #993556;
    --particle-flip: #7f77dd;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    min-height: 100vh;
  }

  .wrap {
    width: 100%;
    max-width: 720px;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 22px;
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .byline {
    font-size: 13px;
    color: var(--text-dim);
  }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
    font-size: 14px;
    color: var(--text-muted);
  }

  .hud-stat {
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
  }

  .hud-val {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  canvas {
    display: block;
    width: 100%;
    aspect-ratio: 680 / 360;
    background: var(--panel);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    touch-action: none;
  }

  .hint {
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
    margin: 12px 0 0;
    transition: opacity 0.3s;
  }

  footer {
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }

  footer a {
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 0.5px solid var(--border-strong);
  }
  footer a:hover { color: var(--text); }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafaf9;
      --panel: #f1efe8;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.2);
      --text: #18181b;
      --text-muted: #52525b;
      --text-dim: #a1a1aa;
    }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Polarity</h1>
      <span class="byline">Flip gravity. Don't crash.</span>
    </header>

    <div class="hud">
      <div class="hud-stat">Score <span class="hud-val" id="score">0</span></div>
      <div class="hud-stat">Multiplier <span class="hud-val" id="mult">x1</span></div>
      <div class="hud-stat">Best <span class="hud-val" id="best">0</span></div>
    </div>

    <canvas id="game" width="680" height="360"></canvas>

    <p class="hint" id="hint">Tap, click, or press space to flip gravity</p>

    <footer>
      Near-miss any obstacle to bump your multiplier · <a href="https://github.com/" id="repo">source</a>
    </footer>
  </div>

<script>
(function () {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const multEl = document.getElementById('mult');
  const bestEl = document.getElementById('best');
  const hintEl = document.getElementById('hint');

  const W = 680, H = 360;
  const PLAYER_X = 90, PLAYER_SIZE = 22;

  // Handle high-DPI displays
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr * (rect.width / W), 0, 0, dpr * (rect.height / H), 0, 0);
  }
  window.addEventListener('resize', resizeCanvas);

  function readVar(name, fallback) {
    const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return v || fallback;
  }

  // Persist best score across sessions
  let best = 0;
  try {
    const stored = localStorage.getItem('polarity_best');
    if (stored) best = parseInt(stored, 10) || 0;
  } catch (e) {}

  let state, player, obstacles, particles, speed, distance, multiplier, multTimer, spawnTimer, gameOver, time;

  function reset() {
    state = 'ready';
    player = { y: H - PLAYER_SIZE, vy: 0, gravity: 1, flipping: 0 };
    obstacles = [];
    particles = [];
    speed = 4.2;
    distance = 0;
    multiplier = 1;
    multTimer = 0;
    spawnTimer = 60;
    gameOver = false;
    time = 0;
  }

  function flip() {
    if (state === 'ready') {
      state = 'play';
      hintEl.style.opacity = '0.4';
      return;
    }
    if (state === 'over') {
      reset();
      state = 'play';
      hintEl.textContent = 'Tap, click, or press space to flip gravity';
      hintEl.style.opacity = '0.4';
      return;
    }
    player.gravity *= -1;
    player.vy = 0;
    player.flipping = 1;
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: PLAYER_X + PLAYER_SIZE / 2,
        y: player.y + PLAYER_SIZE / 2,
        vx: (Math.random() - 0.5) * 3,
        vy: (Math.random() - 0.5) * 3,
        life: 20,
        maxLife: 20,
        color: readVar('--particle-flip', '#7f77dd')
      });
    }
  }

  function spawn() {
    const fromTop = Math.random() < 0.5;
    const minH = 60, maxH = 150;
    const h = minH + Math.random() * (maxH - minH);
    const w = 26 + Math.random() * 18;
    obstacles.push({
      x: W + 10,
      y: fromTop ? 0 : H - h,
      w, h,
      scored: false
    });
  }

  function step() {
    time++;
    if (state === 'play') {
      // physics
      player.vy += player.gravity * 0.7;
      player.vy = Math.max(-12, Math.min(12, player.vy));
      player.y += player.vy;
      player.flipping *= 0.85;

      if (player.y < 0) { player.y = 0; player.vy = 0; }
      if (player.y + PLAYER_SIZE > H) { player.y = H - PLAYER_SIZE; player.vy = 0; }

      distance += speed * 0.1;
      speed = Math.min(9, 4.2 + distance * 0.0015);

      if (multTimer > 0) { multTimer--; } else { multiplier = 1; }

      spawnTimer -= speed * 0.18;
      if (spawnTimer <= 0) {
        spawn();
        spawnTimer = 50 + Math.random() * 35;
      }

      for (const o of obstacles) {
        o.x -= speed;

        // near-miss detection
        if (!o.scored && o.x + o.w < PLAYER_X) {
          o.scored = true;
          const dx = Math.max(o.x - (PLAYER_X + PLAYER_SIZE), PLAYER_X - (o.x + o.w));
          const dy = Math.max(o.y - (player.y + PLAYER_SIZE), player.y - (o.y + o.h));
          const gap = Math.max(dx, dy);
          if (gap < 18) {
            multiplier = Math.min(8, multiplier + 1);
            multTimer = 90;
            distance += 5 * multiplier;
            const pcx = PLAYER_X + PLAYER_SIZE / 2;
            const pcy = player.y + PLAYER_SIZE / 2;
            for (let i = 0; i < 8; i++) {
              particles.push({
                x: pcx, y: pcy,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                life: 30, maxLife: 30,
                color: readVar('--warn', '#ef9f27')
              });
            }
          }
        }

        // collision
        if (o.x < PLAYER_X + PLAYER_SIZE && o.x + o.w > PLAYER_X &&
            o.y < player.y + PLAYER_SIZE && o.y + o.h > player.y) {
          gameOver = true;
        }
      }
      obstacles = obstacles.filter(o => o.x + o.w > -10);

      if (gameOver) {
        state = 'over';
        const finalScore = Math.floor(distance);
        if (finalScore > best) {
          best = finalScore;
          try { localStorage.setItem('polarity_best', String(best)); } catch (e) {}
        }
        hintEl.textContent = 'Crashed. Tap to try again.';
        hintEl.style.opacity = '1';
        for (let i = 0; i < 20; i++) {
          particles.push({
            x: PLAYER_X + PLAYER_SIZE / 2,
            y: player.y + PLAYER_SIZE / 2,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 40, maxLife: 40,
            color: readVar('--danger', '#e24b4a')
          });
        }
      }
    }

    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.life--;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    const borderCol = readVar('--border-strong', 'rgba(255,255,255,0.18)');
    const borderDim = readVar('--border', 'rgba(255,255,255,0.08)');

    // floor / ceiling
    ctx.strokeStyle = borderCol;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, 0.5); ctx.lineTo(W, 0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, H - 0.5); ctx.lineTo(W, H - 0.5); ctx.stroke();

    // scrolling tick marks
    ctx.strokeStyle = borderDim;
    const tickOffset = (time * speed) % 40;
    for (let x = -tickOffset; x < W; x += 40) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, H); ctx.lineTo(x, H - 6); ctx.stroke();
    }

    // obstacles
    for (const o of obstacles) {
      ctx.fillStyle = readVar('--obstacle', '#d4537e');
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.fillStyle = readVar('--obstacle-cap', '#993556');
      if (o.y === 0) {
        ctx.fillRect(o.x, o.h - 4, o.w, 4);
      } else {
        ctx.fillRect(o.x, o.y, o.w, 4);
      }
    }

    // player
    const px = PLAYER_X, py = player.y;
    ctx.fillStyle = state === 'over' ? readVar('--danger', '#e24b4a') : readVar('--accent', '#1d9e75');
    ctx.fillRect(px, py, PLAYER_SIZE, PLAYER_SIZE);

    // gravity arrow
    ctx.fillStyle = readVar('--accent-dark', '#04342c');
    const cx = px + PLAYER_SIZE / 2;
    if (player.gravity > 0) {
      ctx.beginPath();
      ctx.moveTo(cx - 4, py + 7);
      ctx.lineTo(cx + 4, py + 7);
      ctx.lineTo(cx, py + 14);
      ctx.closePath(); ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(cx - 4, py + PLAYER_SIZE - 7);
      ctx.lineTo(cx + 4, py + PLAYER_SIZE - 7);
      ctx.lineTo(cx, py + PLAYER_SIZE - 14);
      ctx.closePath(); ctx.fill();
    }

    // particles
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;

    // overlays
    if (state === 'ready') {
      ctx.fillStyle = readVar('--text', '#fff');
      ctx.font = '500 24px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Polarity', W / 2, H / 2 - 10);
      ctx.fillStyle = readVar('--text-muted', '#a1a1aa');
      ctx.font = '14px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText('Tap to begin', W / 2, H / 2 + 14);
    }
    if (state === 'over') {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff';
      ctx.font = '500 24px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Game over', W / 2, H / 2 - 18);
      ctx.font = '16px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText('Score: ' + Math.floor(distance), W / 2, H / 2 + 8);
      ctx.font = '13px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillStyle = '#d4d4d8';
      ctx.fillText('Tap to restart', W / 2, H / 2 + 30);
    }
  }

  function loop() {
    step();
    draw();
    scoreEl.textContent = Math.floor(distance);
    multEl.textContent = 'x' + multiplier;
    multEl.style.color = multiplier > 1 ? readVar('--warn-text', '#ba7517') : readVar('--text', '#fff');
    bestEl.textContent = best;
    requestAnimationFrame(loop);
  }

  // input
  canvas.addEventListener('mousedown', (e) => { e.preventDefault(); flip(); });
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flip(); }, { passive: false });
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown') {
      e.preventDefault();
      flip();
    }
  });

  // boot
  resizeCanvas();
  reset();
  loop();
})();
</script>
</body>
</html>
